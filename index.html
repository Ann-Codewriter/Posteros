<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posteros | Homepage</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <section>
      <header class="hero-section">
        <nav>
          <logo class="logo" href="#home"> POSTEROS </logo>

          <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><a href="#gallery">Gallery</a></li>
            <button class="button" href="#joinus">Join Us</button>
          </ul>
        </nav>

        <div class="hero-text">
          <h1>Next Generation Coders Platform For Digital</h1>
          <p>
            Lorem ipsum dolor sit amet consectetur. Massa laoreet velit ligula
            metus at pulvinar morbi.
          </p>
          <a class="join-us" href="">Join Us</a>
          <a class="learn-more" href="">Learn More</a>
        </div>

        <section>
        <div>
            <h3>Join the coding Train</h3>
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Full Name" tabindex="1" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email" tabindex="2" required>
                <label for="department">Department</label>
                <select id="department" name="department">
                    <option value="" disabled selected>Choose Department</option>
                    <option value="administration">Administration</option>
                    <option value="finance">Finance</option>
                    <option value="human resource">Human Resource</option>
                </select>

                <label for="time">Time</label>
                <select id="time" name="time">
                    <option value="" disabled selected>Choose Option</option>
                    <option value="administration">9:00 Available</option>
                    <option value="finance">10:00 Available</option>
                    <option value="human resource">11:00 Available</option>
                </select>
            </form>
        </div>

        <div class="form-btn">
            <a href="#">Book Appointment</a>
        </div>
        </section>
      </header>
    </section>
  </body>
</html>
